name: Deploy Cloudflare Workers

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: cloudflare-workers-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run data and license gate
        run: npm run data:test

      - name: Run quality gate
        run: npm run check

      - name: Build deployment assets
        run: npm run build

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Record staging URL
        run: echo "Deployed staging URL: https://mapnesia.andrew-sebastian91.workers.dev" >> "$GITHUB_STEP_SUMMARY"
